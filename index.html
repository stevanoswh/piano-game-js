<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Piano Game</h1>
        <div id="hud">
            <div id="score-display">Score: <span id="score">0</span></div>
            <div id="streak-display">Streak: <span id="streak">0</span></div>
            <div id="mode-display">Mode: <span id="mode">Free Play</span></div>
        </div>
        <div id="note-highway"></div>
        <div id="piano"></div>
        <div id="controls">
            <button id="btn-freeplay" class="active">Free Play</button>
            <button id="btn-challenge">Challenge</button>
            <button id="btn-learn">Learn Song</button>
            <select id="song-select">
                <option value="twinkle">Twinkle Twinkle</option>
                <option value="mary">Mary Had a Little Lamb</option>
                <option value="ode">Ode to Joy</option>
                <option value="happy">Happy Birthday</option>
            </select>
        </div>
        <div id="dj-section">
            <h2>DJ Beat Pads</h2>
            <div id="dj-status">Click a pad to record a beat (2s/4s/8s). Press pad again to play/loop it.</div>
            <div id="dj-settings">
                <label>Beat length:</label>
                <button class="len-btn active" data-len="2">2s</button>
                <button class="len-btn" data-len="4">4s</button>
                <button class="len-btn" data-len="8">8s</button>
                <label style="margin-left:15px">BPM:</label>
                <input type="number" id="bpm-input" value="120" min="60" max="200" step="5">
            </div>
            <div id="pads">
                <div class="pad" data-pad="0"><div class="pad-key">1</div><div class="pad-label">Empty</div><div class="pad-timer"></div></div>
                <div class="pad" data-pad="1"><div class="pad-key">2</div><div class="pad-label">Empty</div><div class="pad-timer"></div></div>
                <div class="pad" data-pad="2"><div class="pad-key">3</div><div class="pad-label">Empty</div><div class="pad-timer"></div></div>
                <div class="pad" data-pad="3"><div class="pad-key">4</div><div class="pad-label">Empty</div><div class="pad-timer"></div></div>
            </div>
            <div id="dj-controls">
                <button id="btn-play-all">Play All</button>
                <button id="btn-stop-all">Stop All</button>
                <button id="btn-clear-all">Clear All</button>
                <button id="btn-export-mix">Export Mix</button>
            </div>
        </div>
        <div id="instructions">
            <p>Use keyboard keys <strong>A S D F G H J</strong> (white) and <strong>W E T Y U</strong> (black) to play.</p>
            <p>Or click the piano keys with your mouse.</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
